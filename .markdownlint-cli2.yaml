# ============================================================
# .markdownlint-cli2.yaml (Markdownlint CLI2 configuration)
# ============================================================
# Updated: 2026-06-04
# WHY: Generated and dependency directories are not source content.
# REQ: Markdown lint should check authored Markdown, not virtual
#      environments, dependency trees, build output, or generated docs.
# Run with:
# npx markdownlint-cli2 --fix

# === Set the scope of files to check ===

# Check these types of files
globs:
  - "**/*.md"

# Do not check these files or directories
ignores:
  - ".lake/**"
  - "**/.lake/**"
  - ".mypy_cache/**"
  - "**/.mypy_cache/**"
  - ".nox/**"
  - "**/.nox/**"
  - ".pyright/**"
  - "**/.pyright/**"
  - ".pytest_cache/**"
  - "**/.pytest_cache/**"
  - ".ruff_cache/**"
  - "**/.ruff_cache/**"
  - ".tox/**"
  - "**/.tox/**"
  - ".uv-cache/**"
  - "**/.uv-cache/**"
  - ".venv/**"
  - "**/.venv/**"
  - "build/**"
  - "**/build/**"
  - "dist/**"
  - "**/dist/**"
  - "htmlcov/**"
  - "**/htmlcov/**"
  - "node_modules/**"
  - "**/node_modules/**"
  - "site/**"
  - "**/site/**"
  - "LICENSE"
  - "CODEOWNERS"


# === Configure rules ===

config:

  default: true # WHY: Enables all default rules, which is a good starting point for linting Markdown files.

  MD013:
    line_length: 250
    headings: false # WHY: Allows long headings for clarity and SEO in Markdown files.
    tables: false # WHY: Allows long table cells for readability and completeness in Markdown files.
    code_blocks: false # WHY: Allows long lines in code blocks for readability and completeness in Markdown files.

  MD025: false # WHY: Allow multiple H1 headings when a file is not a linear document.

  MD033:
    allowed_elements:
      - details # collapsible sections
      - img     # images
      - link    # links
      - mark    # highlighting
      - meta    # metadata
      - summary # summary elements
