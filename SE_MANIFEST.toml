# ============================================================
# SE_MANIFEST.toml (Repository Declaration)
# ============================================================

schema = "se-manifest-schema"
schema_version = "0.5.0"
schema_url = "https://raw.githubusercontent.com/structural-explainability/se-manifest-schema/main/manifest-schema.toml"

# === Framework Context ===

[meta]
framework = "Structural Explainability"
framework_url = "https://github.com/structural-explainability"
purpose = "Declares this repository's role in the Structural Explainability ecosystem."

# === Repository Identity ===

[repository]
organization = "structural-explainability"
name = ".github"
class = "admin"
kind = "governance"
status = "active"
since = "2025"
summary = "Organization-wide profile and ecosystem overview for Structural Explainability."

# === Layer Position ===

[layer]
space = "structural-explainability"
role = "administration"

# === Dependency Declarations ===

[depends]
required = []
optional = []

# === Provided Artifacts ===

[provides]
artifacts = ["README.md", "profile/README.md"]

# === Scope ===

[scope]
includes = [
    "organization-level GitHub profile content",
    "ecosystem overview and repository navigation",
    "repository health defaults when present",
]

excludes = [
    "normative specification definitions",
    "formal constraints or invariants",
    "conformance requirements",
    "implementation logic",
    "domain semantics",
    "interpretive or evaluative claims",
]

# === Compatibility ===

[compatibility]
constitution = "none"

# === External references ===

[citation]
cff = "CITATION.cff"
preferred = "repo"

[traceability]
identifier_map = "none"
